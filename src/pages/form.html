<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../../static/images/Favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission and Enquiry Form - SNS College of Technology</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 sm:p-8">

    <div class="max-w-xl w-full bg-white rounded-[2.5rem] p-8 sm:p-12 shadow-sm border border-gray-100">
        <h1 class="text-3xl md:text-4xl font-extrabold mb-12 text-center text-black leading-tight">Admission and Enquiry
            Form</h1>

        <form action="#" method="POST" class="space-y-6">
            <!-- Full Name -->
            <div>
                <input type="text" name="child_name" placeholder="Name of the Child *" required
                    class="w-full px-6 py-4 rounded-2xl border border-gray-200 focus:outline-none focus:border-gray-400 bg-white text-gray-700 font-medium placeholder-gray-400 transition-all text-base">
            </div>

            <!-- Date of Birth -->
            <div class="relative">
                <input type="text" name="dob" placeholder="Date of birth *" required onfocus="(this.type='date')"
                    onblur="(this.type='text')"
                    class="w-full px-6 py-4 rounded-2xl border border-gray-200 focus:outline-none focus:border-gray-400 bg-white text-gray-700 font-medium placeholder-gray-400 transition-all text-base">
            </div>

            <!-- Mobile Number -->
            <div>
                <input type="tel" name="mobile" placeholder="Mobile number *" required
                    class="w-full px-6 py-4 rounded-2xl border border-gray-200 focus:outline-none focus:border-gray-400 bg-white text-gray-700 font-medium placeholder-gray-400 transition-all text-base">
            </div>


            <!-- Parent Name -->
            <div>
                <input type="text" name="parent_name" placeholder="Parent Name *" required
                    class="w-full px-6 py-4 rounded-2xl border border-gray-200 focus:outline-none focus:border-gray-400 bg-white text-gray-700 font-medium placeholder-gray-400 transition-all text-base">
            </div>

            <!-- Alternative Contact -->
            <div>
                <input type="tel" name="alt_mobile" placeholder="Alternative Contact No *" required
                    class="w-full px-6 py-4 rounded-2xl border border-gray-200 focus:outline-none focus:border-gray-400 bg-white text-gray-700 font-medium placeholder-gray-400 transition-all text-base">
            </div>

            <!-- Address -->
            <div>
                <input type="text" name="address" placeholder="Address *" required
                    class="w-full px-6 py-4 rounded-2xl border border-gray-200 focus:outline-none focus:border-gray-400 bg-white text-gray-700 font-medium placeholder-gray-400 transition-all text-base">
            </div>

            <!-- Institution Selection -->
            <div class="relative">
                <select name="institution" required
                    class="w-full px-6 py-4 rounded-2xl border border-gray-200 focus:outline-none focus:border-gray-400 bg-white text-gray-700 font-medium appearance-none transition-all text-sm sm:text-base">
                    <option value="" disabled selected>Select Institution *</option>
                    <option value="SNS College of Technology">SNS College of Technology</option>
                    <option value="SNS College of Engineering">SNS College of Engineering</option>
                    <option value="SNS Academy">SNS Academy</option>
                    <option value="SNS College of Allied Health Sciences">SNS College of Allied Health Sciences</option>
                    <option value="SNS College of Pharmacy">SNS College of Pharmacy</option>
                    <option value="SNS College of Nursing">SNS College of Nursing</option>
                </select>
                <div class="absolute inset-y-0 right-6 flex items-center pointer-events-none">
                    <i class="fas fa-chevron-down text-gray-400 text-sm"></i>
                </div>
            </div>

            <!-- Submit Button -->
            <div class="pt-6 text-center">
                <button type="submit"
                    class="w-full bg-[#f04e23] hover:bg-[#d8431e] text-white py-5 rounded-[2.5rem] font-bold text-xl sm:text-2xl transition-all shadow-lg active:scale-95">
                    Call me!!!
                </button>
            </div>

            <!-- Report Abuse Link -->
            <div class="mt-10 flex items-center justify-start space-x-2 text-[11px] text-gray-300">
                <a href="#" class="hover:underline border-b border-gray-200 pb-0.5">Report abuse</a>
                <i class="far fa-question-circle text-xs"></i>
            </div>
        </form>
    </div>

</body>

</html>
